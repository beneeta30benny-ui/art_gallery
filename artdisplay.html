<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Gallery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f8f9fa;
}
.card{
    transition:0.3s;
}
.card:hover{
    transform:scale(1.05);
}
img{
    height:250px;
    object-fit:cover;
}
</style>

</head>
<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="#">Art Gallery</a>
</div>
</nav>

<div class="container mt-5">

<h2 class="text-center mb-4">Famous Paintings</h2>

<div class="row">

<div class="col-md-4 mb-4">
<div class="card">
<img src="images/monalisa.jpg" class="card-img-top">
<div class="card-body text-center">
<h5>Mona Lisa</h5>
<p>Leonardo da Vinci</p>
<a href="monalisa.html" class="btn btn-primary">View</a>
</div>
</div>
</div>

<div class="col-md-4 mb-4">
<div class="card">
<img src="images/starrynight.jpg" class="card-img-top">
<div class="card-body text-center">
<h5>The Starry Night</h5>
<p>Vincent van Gogh</p>
<a href="starrynight.html" class="btn btn-primary">View</a>
</div>
</div>
</div>

<div class="col-md-4 mb-4">
<div class="card">
<img src="images/scream.jpg" class="card-img-top">
<div class="card-body text-center">
<h5>The Scream</h5>
<p>Edvard Munch</p>
<a href="scream.html" class="btn btn-primary">View</a>
</div>
</div>
</div>

<div class="col-md-4 mb-4">
<div class="card">
<img src="images/girlwithpearl.jpg" class="card-img-top">
<div class="card-body text-center">
<h5>Girl with a Pearl Earring</h5>
<p>Johannes Vermeer</p>
<a href="girlwithpearl.html" class="btn btn-primary">View</a>
</div>
</div>
</div>

<div class="col-md-4 mb-4">
<div class="card">
<img src="images/persistence.jpg" class="card-img-top">
<div class="card-body text-center">
<h5>The Persistence of Memory</h5>
<p>Salvador Dalí</p>
<a href="persistence.html" class="btn btn-primary">View</a>
</div>
</div>
</div>

</div>

</div>

</body>
</html>
